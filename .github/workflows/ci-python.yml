name: ci-python

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'python-etl/**'
      - '.github/workflows/ci-python.yml'

permissions:
  contents: read

concurrency:
  group: ci-python-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python-etl
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install test dependencies
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install ruff mypy pytest
          # torch from the CPU-only index: the default wheel drags in ~2 GB of CUDA that a
          # GitHub runner can never use. tests/test_olmoearth_pooling.py needs real torch
          # (it exercises pool_tokens, which operates on encoder tensors) — skipping it in
          # CI would leave the phenology-preservation proof unverified where it matters.
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements-test.txt

      - name: Ruff (lint) — gate
        run: ruff check riparian tests

      - name: Mypy (type-check) — advisory
        continue-on-error: true
        run: mypy riparian --ignore-missing-imports --no-error-summary

      - name: Pytest (unit tests; skip live) — gate
        run: pytest -m "not live"
