[pytest]
# Run from python-etl/ so the `riparian` package is importable.
pythonpath = .
testpaths = tests
python_files = test_*.py
addopts = -q
markers =
    live: hits real external services (STAC / DB); skipped in CI, run manually
    live_db: needs a real PostGIS (RIPARIANDB_TEST_URI). Skipped locally without it; RUN IN CI
        against a postgis service container. These pin the two ETL defects no mock can catch —
        the FK cascade that silently emptied buffer_wetlands, and the basin-wide-instead-of-
        per-watershed aggregation. A mock returns whatever you told it to.
