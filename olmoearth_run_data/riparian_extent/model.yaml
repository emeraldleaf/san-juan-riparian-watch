# Riparian extent segmentation — OlmoEarth fine-tune.
#
# Mirrors allenai/olmoearth_projects `mangrove` (the closest analog: segment a woody
# vegetation class near water from a Sentinel-2 time series, validated against an
# authoritative reference map — GMW there, NMRipMap here).
#
# The load-bearing difference from our earlier `riparian/delineation/olmoearth.py`
# experiment (RF 0.73 vs OlmoEarth-Nano 0.46): that run FROZE a Nano encoder, mean-pooled
# tokens over time + band-sets, and fit a sklearn RandomForest head on 5 timesteps. This
# config instead uses OLMOEARTH_V1_BASE with a real segmentation decoder and actually
# FINE-TUNES the backbone (FreezeUnfreeze at epoch 20, 10x LR) over 12 monthly mosaics —
# which is what the mangrove recipe does, and what preserves the phenology signal.
#
# Classes (zero_is_invalid: true, so 0 = invalid/no-label):
#   1 = riparian, 2 = water, 3 = other
# lightning.pytorch==2.5.1.post0
seed_everything: 0
model:
  class_path: rslearn.train.lightning_module.RslearnLightningModule
  init_args:
    model:
      class_path: rslearn.models.multitask.MultiTaskModel
      init_args:
        encoder:
        - class_path: rslearn.models.olmoearth_pretrain.model.OlmoEarth
          init_args:
              # v1.1, NOT v1. MEASURED on this exact config (32x32 window, 12 monthly mosaics,
              # patch_size 2): v1 emits 9,216 tokens/window; v1.1 emits 3,072 — it merges the S2
              # bands into single tokens (band-set axis 3 -> 1). Attention is O(n^2), so it
              # compounds: v1 costs ~3x and may not fit 24 GB at batch 8. Our own fair test found
              # v1.1 ~= v1 in quality (within noise), so the saving is free.
              #
              # NB: Ai2's mangrove recipe uses OLMOEARTH_V1_BASE. If rslearn 0.0.27 does not wire
              # the v1.1 id, fall back to V1_BASE and pay the 3x — but find that out in Phase 0, on
              # a laptop, not on a rented GPU. See docs/specs/2026-07-12-gpu-finetune-execution-plan.md
              model_id: OLMOEARTH_V1_1_BASE
              patch_size: 2
        decoders:
          riparian_classification:
          - class_path: rslearn.models.pooling_decoder.SegmentationPoolingDecoder
            init_args:
              in_channels: 768
              out_channels: 4
              num_conv_layers: 0
              num_fc_layers: 0
              conv_channels: 128
              fc_channels: 512
              image_key: "sentinel2_l2a"
          - class_path: rslearn.train.tasks.segmentation.SegmentationHead
        lazy_decode: false
        loss_weights: null
    optimizer: null
    scheduler: null
    visualize_dir: null
    metrics_file: null
    restore_config: null
    print_parameters: false
    print_model: false
    lr: 0.0001
    plateau: true
    plateau_factor: 0.2
    plateau_patience: 2
    plateau_min_lr: 0.0
    plateau_cooldown: 10
data:
  class_path: rslearn.train.data_module.RslearnDataModule
  init_args:
    inputs:
      label:
        class_path: rslearn.train.dataset.DataInput
        init_args:
          data_type: raster
          layers:
          - label_raster
          bands:
          - label
          required: true
          passthrough: false
          is_target: true
          dtype: INT32
          load_all_layers: false
          load_all_item_groups: false
      sentinel2_l2a:
        class_path: rslearn.train.dataset.DataInput
        init_args:
          data_type: raster
          layers:
          - sentinel2
          bands:
          - B02
          - B03
          - B04
          - B08
          - B05
          - B06
          - B07
          - B8A
          - B11
          - B12
          - B01
          - B09
          required: true
          passthrough: true
          is_target: false
          dtype: FLOAT32
          load_all_layers: true
          load_all_item_groups: true
    task:
      class_path: rslearn.train.tasks.multi_task.MultiTask
      init_args:
        tasks:
          riparian_classification:
            class_path: rslearn.train.tasks.segmentation.SegmentationTask
            init_args:
              num_classes: 4
              colors:
              - - 0
                - 0
                - 0
              - - 34
                - 139
                - 34
              - - 0
                - 191
                - 255
              - - 210
                - 180
                - 140
              zero_is_invalid: true
              enable_accuracy_metric: true
              enable_miou_metric: false
              enable_f1_metric: true
              f1_metric_thresholds:
              - - 0.5
              metric_kwargs:
                average: micro
              miou_metric_kwargs: {}
              prob_scales: null
              other_metrics:
                riparian_precision:
                  class_path: rslearn.train.tasks.segmentation.SegmentationMetric
                  init_args:
                    metric:
                      class_path: torchmetrics.classification.MulticlassPrecision
                      init_args:
                        num_classes: 4
                        top_k: 1
                        average: null
                        multidim_average: global
                        ignore_index: null
                        validate_args: true
                        zero_division: 0
                    pass_probabilities: true
                    class_idx: 1
                riparian_recall:
                  class_path: rslearn.train.tasks.segmentation.SegmentationMetric
                  init_args:
                    metric:
                      class_path: torchmetrics.classification.MulticlassRecall
                      init_args:
                        num_classes: 4
                        top_k: 1
                        average: null
                        multidim_average: global
                        ignore_index: null
                        validate_args: true
                        zero_division: 0
                    pass_probabilities: true
                    class_idx: 1
                water_precision:
                  class_path: rslearn.train.tasks.segmentation.SegmentationMetric
                  init_args:
                    metric:
                      class_path: torchmetrics.classification.MulticlassPrecision
                      init_args:
                        num_classes: 4
                        top_k: 1
                        average: null
                        multidim_average: global
                        ignore_index: null
                        validate_args: true
                        zero_division: 0
                    pass_probabilities: true
                    class_idx: 2
                other_precision:
                  class_path: rslearn.train.tasks.segmentation.SegmentationMetric
                  init_args:
                    metric:
                      class_path: torchmetrics.classification.MulticlassPrecision
                      init_args:
                        num_classes: 4
                        top_k: 1
                        average: null
                        multidim_average: global
                        ignore_index: null
                        validate_args: true
                        zero_division: 0
                    pass_probabilities: true
                    class_idx: 3
              image_bands:
              - 0
              - 1
              - 2
              remap_values: null
        input_mapping:
          riparian_classification:
            label: targets
    path: ${DATASET_PATH}
    path_options: {}
    batch_size: 32
    num_workers: ${NUM_WORKERS}
    init_workers: 0
    default_config:
      class_path: rslearn.train.dataset.SplitConfig
      init_args:
        groups: null
        names: null
        tags: null
        num_samples: null
        num_patches: null
        transforms:
        - class_path: rslearn.train.transforms.pad.Pad
          init_args:
            size: 2
            mode: center
            image_selectors:
            - sentinel2_l2a
            - target/riparian_classification/classes
            - target/riparian_classification/valid
            box_selectors: []
        - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
          init_args:
            band_names:
              sentinel2_l2a:
              - B02
              - B03
              - B04
              - B08
              - B05
              - B06
              - B07
              - B8A
              - B11
              - B12
              - B01
              - B09
            std_multiplier: 2.0
    # Spatial split: windows are tagged split=train|val by spatially hashing their grid
    # cell (NOT a random split) — the same discipline as riparian/delineation/validate.py,
    # so autocorrelated neighbours can't leak across the split.
    train_config:
      class_path: rslearn.train.dataset.SplitConfig
      init_args:
        groups:
        - san_juan_nmripmap
        names: null
        tags:
          split: train
        num_samples: null
    val_config:
      class_path: rslearn.train.dataset.SplitConfig
      init_args:
        groups:
        - san_juan_nmripmap
        names: null
        tags:
          split: val
    test_config:
      class_path: rslearn.train.dataset.SplitConfig
      init_args:
        groups:
        - san_juan_nmripmap
        names: null
        tags:
          split: val
    predict_config:
      patch_size: 2
      overlap_ratio: null
      load_all_patches: true
      skip_targets: true
      transforms:
      - class_path: rslearn.models.olmoearth_pretrain.norm.OlmoEarthNormalize
        init_args:
          band_names:
            sentinel2_l2a:
            - B02
            - B03
            - B04
            - B08
            - B05
            - B06
            - B07
            - B8A
            - B11
            - B12
            - B01
            - B09
      - class_path: rslearn.train.transforms.pad.Pad
        init_args:
          size: 2
          mode: "center"
          image_selectors: ["sentinel2_l2a"]
    name: null
    retries: 0
trainer:
  accelerator: auto
  strategy:
    class_path: lightning.pytorch.strategies.DDPStrategy
    init_args:
      find_unused_parameters: true
  devices: auto
  num_nodes: 1
  logger:
    class_path: lightning.pytorch.loggers.WandbLogger
    init_args:
      project: ${WANDB_PROJECT}
      name: ${WANDB_NAME}
      entity: ${WANDB_ENTITY}
  callbacks:
  - class_path: rslearn.train.prediction_writer.RslearnWriter
    init_args:
      path: ${DATASET_PATH}
      output_layer: ${PREDICTION_OUTPUT_LAYER}
      selector: ["riparian_classification"]
      merger: null
  - class_path: lightning.pytorch.callbacks.ModelCheckpoint
    init_args:
      dirpath: ${CHECKPOINT_PATH}
      filename: null
      monitor: val_loss
      verbose: false
      save_last: true
      save_top_k: 1
      save_weights_only: false
      mode: min
      auto_insert_metric_name: true
      enable_version_counter: true
  # THE fix vs our earlier experiment: the backbone is genuinely fine-tuned, not frozen
  # behind an RF head. Warm up the decoder for 20 epochs, then unfreeze the encoder at 10x LR.
  - class_path: rslearn.train.callbacks.freeze_unfreeze.FreezeUnfreeze
    init_args:
      module_selector:
      - model
      - encoder
      - 0
      unfreeze_at_epoch: 20
      unfreeze_lr_factor: 10.0
  max_epochs: 100
  max_steps: -1
  overfit_batches: 0.0
  check_val_every_n_epoch: 1
  accumulate_grad_batches: 1
