  # -------------------------------------------------------------------------
  # Method prior art for the FM decision (added 2026-07-17 from the CPU
  # pre-flight handoff — docs/audits/2026-07-16-DECISION-MEMO-olmoearth-gpu.md).
  #
  # DELIBERATELY FIVE, NOT 320. The handoff ships a 320-paper index
  # (docs/audits/riparian_methods_corpus_linked.csv, 306 with OA PDFs). It is an
  # index to SEARCH, not a pile to ingest: only 8 of 320 score >=7 on
  # method_relevance, and the top-ranked paper is Spartina in the Yangtze Estuary —
  # method-similar, wrong biome. This corpus is San Juan *watershed documents*
  # with geo_focus for geo-mention testing; bulk-loading global RS methods papers
  # would flip it into a generic remote-sensing pile and hurt the RAG's actual job.
  # These five are here because the decision memo LEANS on them. The other 315
  # stay searchable in the CSV until something needs them.
  # -------------------------------------------------------------------------

  - id: presto-tseng-2023-lightweight-rs-timeseries
    title: "Lightweight, Pre-trained Transformers for Remote Sensing Timeseries (Presto)"
    url: https://arxiv.org/pdf/2304.14065
    agency: academic
    year: 2023
    doc_type: paper
    format: pdf
    license: verify            # arXiv preprint — check the author licence before redistribution
    geo_focus: false
    fetch: auto                # arxiv.org resolves fine (unlike mdpi/researchgate)
    topics: [foundation-model, timeseries, presto, prior-art, method]
    # THE model behind every number in the CPU pre-flight. Its fine-tuned form — 0.82M
    # params, free, on a laptop — is the bar OlmoEarth-Base (207.5M, GPU) must beat:
    # ~0.75 ROC on hard-source species transfer. Beating RF is not enough; a free CPU
    # model already does that. Verified 2026-07-17: arXiv title matches.

  - id: cropglobe-tong-2025-invariant-features-crop-type
    title: "Invariant Features for Global Crop Type Classification (CropGlobe)"
    url: https://arxiv.org/pdf/2509.03497
    agency: academic
    year: 2025
    doc_type: paper
    format: pdf
    license: verify
    geo_focus: false
    fetch: auto
    topics: [foundation-model, transfer, prior-art, method, threat]
    # 🔴 THE DIRECT CHALLENGE TO OUR CONTRIBUTION, and not yet audited. Finds simple
    # spectral-temporal features MATCH FM embeddings on cross-geography transfer — which
    # is exactly what our own in-tile ties reproduce (FM ties RF). If it generalises to
    # riparian, the FM premise weakens. It is why fine-tuning (not frozen embeddings) is
    # the operative variable. Queued in docs/audits/README.md "Still to audit".
    # NB: "CropGlobe" is the memo's shorthand; the arXiv title is as above (verified).

  - id: prithvi-jakubik-2023-geospatial-foundation-model
    title: "Foundation Models for Generalist Geospatial Artificial Intelligence (Prithvi)"
    url: https://arxiv.org/pdf/2310.18660
    agency: academic
    year: 2023
    doc_type: paper
    format: pdf
    license: verify
    geo_focus: false
    fetch: auto
    topics: [foundation-model, prithvi, prior-art, method]
