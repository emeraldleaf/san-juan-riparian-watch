# San Juan Riparian Watch — document-intelligence corpus seed list
# ---------------------------------------------------------------------------
# Reproducible, in-repo list of public San Juan-watershed documents to ingest.
# The ingestion job (Phase A) reads this file, fetches each source, records
# provenance (source_url + sha256 + retrieved_at) into docs.documents, then
# chunks/embeds into Qdrant and geo-tags chunks into docs.chunk_geo_mentions.
#
# Fields:
#   id         stable external_id (kebab-case) -> docs.documents.external_id
#   title      document title
#   url        direct fetch URL (PDF or web page)
#   agency     publishing body (SJRIP/USGS/EPA/NMED/USBR/CO/academic)
#   year       publication year (null if unknown)
#   doc_type   plan | report | paper | metadata | webpage
#   format     pdf | html
#   license    'public-domain-us-gov' for federal works; else 'verify'
#   geo_focus  true when the doc is rich in place/reach mentions (priority for
#              geo-mention testing)
#   topics     tag list (riparian, invasive, hydrology, restoration, water-quality...)
#   fetch      auto (default) | manual
#              'manual' = the publisher bot-blocks automated fetch (Cloudflare JS
#              challenge), so the ingest job CANNOT retrieve it and must skip it.
#              These are open-access papers — download the PDF once by hand into the
#              local corpus dir. Verified 2026-07-11: mdpi.com, researchgate.net and
#              www.usgs.gov all return 403 to curl even with a browser User-Agent;
#              pubs.usgs.gov, arxiv.org, pmc.ncbi.nlm.nih.gov and doi.org resolve fine.
#              Declaring this is deliberate: a corpus entry that 403s at ingest is worse
#              than one that says up front it needs a human.
#
# NOTE: URLs verified via web search 2026-07-04; re-verify at fetch time (agency
# sites move files). Licenses for federal/state works are generally public; the
# academic/ResearchGate mirrors are pointers only — prefer the agency-hosted PDF.
# ---------------------------------------------------------------------------

